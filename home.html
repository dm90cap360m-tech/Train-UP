<!DOCTYPE html>
<html>
<head>
  <title>Home Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f9;
    }

    /* NAVBAR */
    .navbar {
      background: #1e3c72;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-size: 18px;
    }

    .navbar a:hover {
      text-decoration: underline;
    }

    /* HERO SECTION */
    .hero {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 60px;
      margin: 0;
    }

    .hero p {
      font-size: 20px;
      opacity: 0.9;
    }

    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 12px 30px;
      background: #00c6ff;
      color: white;
      border-radius: 30px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    /* CONTENT */
    .content {
      padding: 50px;
      text-align: center;
    }

    .card {
      display: inline-block;
      background: white;
      padding: 20px;
      margin: 15px;
      width: 200px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div><b>My Website</b></div>
    <div>
      <a href="index.html">Welcome</a>
      <a href="home.html">Home</a>
      <a href="#">Contact</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Welcome Home</h1>
    <p>This is your main home page</p>
    <a href="index.html" class="btn">Go Back</a>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="card">HTML</div>
    <div class="card">CSS</div>
    <div class="card">JavaScript</div>
  </div>

</body>
</html>
